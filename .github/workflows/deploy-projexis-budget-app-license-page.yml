# ──────────────────────────────────────────────────────────────────────
# Deploy Projexis Budget App License Page to Cloudflare Workers via OpenNext
# ──────────────────────────────────────────────────────────────────────

name: Deploy Projexis Budget App License Page

on:
  push:
    branches: main
    paths:
      - 'apps/projexis-budget-app-license-page/**'
      - '.github/workflows/deploy-projexis-budget-app-license-page.yml'
  workflow_dispatch:

concurrency:
  group: deploy-projexis-budget-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy License Page
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      deployments: write

    defaults:
      run:
        working-directory: apps/projexis-budget-app-license-page

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Deploy
        run: npx opennextjs-cloudflare build && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
